<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Treatment Scores Admin</title>
<style>
:root { --bg: #0b0e17; --card: #111622; --text: #e8eaed; --dim: #8a9099; --accent: #4fc3f7; --border: #1e2538; --green: #46b97e; --red: #e74c5c; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
h1 { color: var(--accent); margin-bottom: 6px; }
p.dim { color: var(--dim); font-size: 0.85em; margin-bottom: 20px; }
.controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
.controls input { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px; }
.controls input:focus { outline: none; border-color: var(--accent); }
.controls label { color: var(--dim); font-size: 0.82em; display: flex; align-items: center; gap: 4px; }
.controls select { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 5px 8px; border-radius: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
th { background: var(--card); padding: 8px 6px; text-align: left; color: var(--accent); border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 2; }
td { padding: 6px; border-bottom: 1px solid var(--border); }
tr:hover td { background: rgba(79,195,247,0.03); }
.score-input { width: 60px; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 3px 6px; border-radius: 3px; text-align: center; }
.score-input:focus { outline: none; border-color: var(--accent); }
.score-set { background: var(--green); color: #000; padding: 1px 6px; border-radius: 3px; font-size: 0.75em; font-weight: 600; }
.score-unset { color: var(--dim); font-style: italic; }
.btn { background: var(--accent); color: #000; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.82em; font-weight: 600; }
.btn:hover { opacity: 0.85; }
.btn-sm { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 0.78em; }
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.fade { transition: opacity 0.3s; }
#msg { color: var(--green); font-size: 0.85em; margin-bottom: 10px; min-height: 1.4em; }
.summary { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
.summary span { background: var(--card); padding: 6px 12px; border-radius: 4px; border: 1px solid var(--border); font-size: 0.82em; }
.summary b { color: var(--accent); }
</style>
</head>
<body>
<h1>🏷️ Tax Treatment Scores</h1>
<p class="dim">Set a score 0.0–1.0 for each ETF. 0 = worst tax treatment (non-qualified dividends), 1 = best (qualified dividends, ROC). Used in Best Portfolios "Best Tax" filter.</p>

<div class="summary">
    <span>Scored: <b id="scored-count">0</b> / <b id="total-count">0</b></span>
    <span><button class="btn" onclick="saveAll()">💾 Save All Changes</button></span>
</div>
<div id="msg"></div>

<div class="controls">
    <label>Search: <input type="text" id="search" placeholder="ticker or name..." oninput="filterTable()"></label>
    <label>Provider:
        <select id="provider-filter" onchange="filterTable()">
            <option value="">All</option>
        </select>
    </label>
    <label>Score:
        <select id="score-filter" onchange="filterTable()">
            <option value="">All</option>
            <option value="unset">Unset only</option>
            <option value="set">Scored only</option>
        </select>
    </label>
</div>

<div style="overflow-x:auto;max-height:70vh;overflow-y:auto">
<table>
<thead>
<tr>
    <th>Ticker</th>
    <th>Name</th>
    <th>Provider</th>
    <th>Yield</th>
    <th style="width:140px">Tax Score (0.0–1.0)</th>
    <th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
let allData = [];
let dirty = new Set();

async function load() {
    const r = await fetch('/api/tax-scores');
    allData = await r.json();
    const providers = [...new Set(allData.map(e => e.provider).filter(Boolean))].sort();
    const sel = document.getElementById('provider-filter');
    providers.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; sel.appendChild(o); });
    render();
}
function render() {
    const q = (document.getElementById('search')?.value || '').toLowerCase();
    const prov = document.getElementById('provider-filter')?.value || '';
    const sf = document.getElementById('score-filter')?.value || '';
    const filtered = allData.filter(e => {
        if (q && !e.ticker.toLowerCase().includes(q) && !(e.name||'').toLowerCase().includes(q)) return false;
        if (prov && e.provider !== prov) return false;
        if (sf === 'unset' && e.tax_treatment_score !== null) return false;
        if (sf === 'set' && e.tax_treatment_score === null) return false;
        return true;
    });
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = filtered.map(e => {
        const val = e.tax_treatment_score !== null ? e.tax_treatment_score : '';
        const hasScore = e.tax_treatment_score !== null;
        return `<tr>
            <td><strong>${e.ticker}</strong></td>
            <td>${e.name || ''}</td>
            <td>${e.provider || ''}</td>
            <td>${e.current_yield != null ? e.current_yield.toFixed(1) + '%' : '-'}</td>
            <td><input type="number" class="score-input" id="score-${e.ticker}" value="${val}" min="0" max="1" step="0.05" onchange="markDirty('${e.ticker}')"></td>
            <td>${hasScore ? '<span class="score-set">set</span>' : '<span class="score-unset">unset</span>'}
                <button class="btn-sm" onclick="quickScore('${e.ticker}', 0.9)">A</button>
                <button class="btn-sm" onclick="quickScore('${e.ticker}', 0.7)">B</button>
                <button class="btn-sm" onclick="quickScore('${e.ticker}', 0.5)">C</button>
                <button class="btn-sm" onclick="quickScore('${e.ticker}', 0.3)">D</button>
                <button class="btn-sm" onclick="quickScore('${e.ticker}', 0.1)">F</button>
                <button class="btn-sm" onclick="quickScore('${e.ticker}', '')" style="color:var(--red)">×</button>
            </td>
        </tr>`;
    }).join('');
    const scored = allData.filter(e => e.tax_treatment_score !== null).length;
    document.getElementById('scored-count').textContent = scored;
    document.getElementById('total-count').textContent = allData.length;
    document.getElementById('msg').textContent = dirty.size ? `${dirty.size} unsaved change(s)` : '';
}
function filterTable() { render(); }
function markDirty(ticker) {
    dirty.add(ticker);
    render();
}
function quickScore(ticker, val) {
    document.getElementById('score-' + ticker).value = val;
    dirty.add(ticker);
    render();
}
async function saveAll() {
    const msg = document.getElementById('msg');
    let saved = 0, failed = 0;
    for (const ticker of dirty) {
        const input = document.getElementById('score-' + ticker);
        const val = input ? input.value.trim() : '';
        if (val !== '' && (isNaN(parseFloat(val)) || parseFloat(val) < 0 || parseFloat(val) > 1)) {
            msg.textContent = `Invalid score for ${ticker}: must be 0.0-1.0`;
            msg.style.color = 'var(--red)';
            return;
        }
        try {
            const r = await fetch('/api/tax-scores', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `ticker=${encodeURIComponent(ticker)}&score=${encodeURIComponent(val)}`
            });
            if (r.ok) saved++;
            else failed++;
        } catch(e) { failed++; }
    }
    dirty.clear();
    msg.style.color = failed ? 'var(--red)' : 'var(--green)';
    msg.textContent = failed ? `Saved ${saved}, ${failed} failed` : `Saved ${saved} score(s)`;
    await load();
}
load();
</script>
</body>
</html>
